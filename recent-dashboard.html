<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">📸 Recent Activity Dashboard</h2>

    <!-- UPLOAD -->
    <div class="card p-3 mb-4">

        <label class="mb-2">Choose Image</label>
        <input type="file" id="file" class="form-control mb-3">

        <select id="category" class="form-control mb-3">
            <option value="inside">Indoor</option>
            <option value="catering">Catering</option>
        </select>

        <button onclick="uploadRecent()" class="btn btn-primary">
            Upload Image
        </button>

    </div>

    <!-- LIST -->
    <div class="card p-3">
        <h5>Recent Images</h5>
        <div id="list" class="row g-3"></div>
    </div>

</div>




<script>
const supabaseUrl = "https://hbibumxhmfjdqpbdgdmi.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiaWJ1bXhobWZqZHFwYmRnZG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTY2NzIsImV4cCI6MjA5MTMzMjY3Mn0.0KgghCk-H-a55UEAJO0lWSOxWFkjQTCCHhpjIsi2SDk";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
}

async function changePassword() {
    const newPassword = prompt("Enter new password:");

    if (!newPassword) return;

    const { data, error } = await supabaseClient.auth.updateUser({
        password: newPassword
    });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Password updated successfully!");
}

function openChangePassword() {
    changePassword();
}

(async () => {
    const { data, error } = await supabaseClient.auth.getUser();

    if (error || !data.user) {
        window.location.href = "login.html";
    }
})();

// UPLOAD
async function uploadRecent() {

    const file = document.getElementById("file").files[0];
    const category = document.getElementById("category").value;

    if (!file) {
        alert("Select image first");
        return;
    }

    const fileName = `public/${Date.now()}_${file.name}`;

    // upload to storage (NEW BUCKET)
    const { error } = await supabaseClient.storage
        .from("recent-images")
        .upload(fileName, file);

    if (error) {
        alert(error.message);
        return;
    }

    const { data } = supabaseClient.storage
        .from("recent-images")
        .getPublicUrl(fileName);

    const image_url = data.publicUrl;

    // save to NEW TABLE
    const { error: dbError } = await supabaseClient
        .from("recent")
        .insert([{ image_url, category }]);

    if (dbError) {
        alert(dbError.message);
        return;
    }

    alert("Uploaded!");
    loadRecent();
}

// LOAD
async function loadRecent() {

    const { data, error } = await supabaseClient
        .from("recent")
        .select("*")
        .order("id", { ascending: false });

    if (error) return;

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {

        list.innerHTML += `
            <div class="col-md-4">
                <div class="card p-2">
                    <img src="${item.image_url}" class="img-fluid rounded mb-2">
                    <small>${item.category}</small>

                    <button class="btn btn-danger btn-sm mt-2"
                        onclick="deleteRecent('${item.id}')">
                        Delete
                    </button>
                </div>
            </div>
        `;
    });
}

// DELETE
async function deleteRecent(id) {

    const { error } = await supabaseClient
        .from("recent")
        .delete()
        .eq("id", id);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Deleted!");
    loadRecent();
}

loadRecent();
</script>
