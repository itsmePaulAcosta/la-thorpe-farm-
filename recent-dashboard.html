<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">📸 Recent Activity Dashboard</h2>

    <!-- UPLOAD -->

        <label class="mb-2">Choose Image</label>

<script>

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
}

async function changePassword() {
    const newPassword = prompt("Enter new password:");

    if (!newPassword) return;

    const { data, error } = await supabaseClient.auth.updateUser({
        password: newPassword
    });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Password updated successfully!");
}

function openChangePassword() {
    changePassword();
}

(async () => {
    const { data, error } = await supabaseClient.auth.getUser();

    if (error || !data.user) {
        window.location.href = "login.html";
    }
})();

// UPLOAD
async function uploadRecent() {

    const files = document.getElementById("file").files;
    const category = document.getElementById("category").value;
    const description = document.getElementById("description").value.trim();

    if (!files.length) {
        alert("Select at least one image");
        return;
    }

    for (let file of files) {

        const fileName = `public/${Date.now()}_${file.name}`;

        // Upload to storage
        const { error: uploadError } = await supabaseClient.storage
            .from("recent-images")
            .upload(fileName, file);

        if (uploadError) {
            alert(uploadError.message);
            continue;
        }

        const { data } = supabaseClient.storage
            .from("recent-images")
            .getPublicUrl(fileName);

        const image_url = data.publicUrl;

        // Save to database
        const { error: dbError } = await supabaseClient
            .from("recent")
            .insert([{ image_url, category, description }]);

        if (dbError) {
            alert(dbError.message);
            continue;
        }
    }

    alert("All images uploaded!");
    document.getElementById("file").value = "";
    document.getElementById("description").value = "";
    loadRecent();
}

// LOAD
async function loadRecent() {

    const { data, error } = await supabaseClient
        .from("recent")
        .select("*")
        .order("id", { ascending: false });

    if (error) return;

    const insideList = document.getElementById("insideList");
    const cateringList = document.getElementById("cateringList");

    insideList.innerHTML = "";
    cateringList.innerHTML = "";

    data.forEach(item => {

        const card = `
            <div class="col-md-4">
                <div class="card p-2">
                    <img src="${item.image_url}" class="img-fluid rounded mb-2">
                    <small class="text-muted">${item.category}</small>
                    <p class="mb-2 mt-2">${item.description || "No description added."}</p>

                    <button class="btn btn-danger btn-sm mt-2"
                        onclick="deleteRecent('${item.id}')">
                        Delete
                    </button>
                </div>
            </div>
        `;

        if (item.category === "inside") {
            insideList.innerHTML += card;
        }

        if (item.category === "catering") {
            cateringList.innerHTML += card;
        }
    });
}

// DELETE
async function deleteRecent(id) {

    const { error } = await supabaseClient
        .from("recent")
        .delete()
        .eq("id", id);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Deleted!");
    loadRecent();
}

loadRecent();
</script>
