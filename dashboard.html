<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - La Thorpe</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Owner Dashboard</h2>
        <div id="login-section">
            <h4>Login</h4>
            <form id="loginForm">
                <div class="mb-3">
                    <input type="email" id="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <div id="loginError" class="text-danger mt-2"></div>
        </div>
        <div id="dashboard-section" style="display:none;">
            <button id="logoutBtn" class="btn btn-secondary mb-3">Logout</button>
            <h4>Welcome, Owner!</h4>
            <hr>
            <h5>Menu Management</h5>
            <form id="menuForm" class="mb-3">
              <div class="row g-2">
                <div class="col-md-4">
                  <select id="menuCategory" class="form-control" required>
                    <option value="catering">Catering</option>
                    <option value="maindishes">Main Dishes</option>
                    <option value="tray">Tray</option>
                  </select>
                </div>
                <div class="col-md-5"><input type="file" id="menuImageFile" class="form-control" accept="image/*" required></div>
                <div class="col-md-2"><img id="menuImagePreview" src="" style="width:40px;display:none;"></div>
                <div class="col-md-1"><button type="submit" class="btn btn-success w-100">Upload</button></div>
              </div>
            </form>
            <ul id="menuList" class="list-group mb-4"></ul>

            <h5>Recent Events Management</h5>
            <form id="recentForm" class="mb-3">
              <div class="row g-2">
                <div class="col-md-3"><input type="text" id="recentTitle" class="form-control" placeholder="Title" required></div>
                <div class="col-md-3"><input type="file" id="recentImageFile" class="form-control" accept="image/*"></div>
                <div class="col-md-1"><img id="recentImagePreview" src="" style="width:40px;display:none;"></div>
                <div class="col-md-3"><input type="date" id="recentDate" class="form-control" required></div>
                <div class="col-md-1"><input type="text" id="recentDesc" class="form-control" placeholder="Description" required></div>
                <div class="col-md-1"><button type="submit" class="btn btn-success w-100">Add</button></div>
              </div>
            </form>
            <ul id="recentList" class="list-group"></ul>
        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <!-- Firebase Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <!-- Firebase Storage -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBuNw7VNAM-Do9ZkiXY5LHKVStJGRwd0Uw",
  authDomain: "menu-restaurant-268da.firebaseapp.com",
  projectId: "menu-restaurant-268da",
  storageBucket: "menu-restaurant-268da.firebasestorage.app",
  messagingSenderId: "1060452948086",
  appId: "1:1060452948086:web:9009a4570c15f334a02757"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

const menuForm = document.getElementById('menuForm');
const menuList = document.getElementById('menuList');

// ✅ UPLOAD MENU IMAGE WITH ID
menuForm.addEventListener('submit', async function(e) {
  e.preventDefault();

  const category = document.getElementById('menuCategory').value;
  const file = document.getElementById('menuImageFile').files[0];
  if (!file) return;

  const storageRef = storage.ref('menu/' + Date.now() + '_' + file.name);
  await storageRef.put(file);
  const imageUrl = await storageRef.getDownloadURL();

  const itemsRef = db.collection('menu').doc('items');

  await db.runTransaction(async (transaction) => {
    const doc = await transaction.get(itemsRef);
    let data = doc.exists ? doc.data() : {};
    let arr = Array.isArray(data[category]) ? data[category] : [];

    arr.push({
      id: Date.now().toString(),
      image: imageUrl
    });

    transaction.set(itemsRef, { ...data, [category]: arr }, { merge: true });
  });

  menuForm.reset();
  loadMenu();
});

// ✅ LOAD MENU (WITH EDIT BUTTON)
async function loadMenu() {
  menuList.innerHTML = '';

  const doc = await db.collection('menu').doc('items').get();
  if (!doc.exists) return;

  const data = doc.data();
  const categories = ['catering', 'maindishes', 'tray'];

  categories.forEach(cat => {
    const arr = data[cat] || [];

    const header = document.createElement('li');
    header.className = 'list-group-item active';
    header.textContent = cat.toUpperCase();
    menuList.appendChild(header);

    arr.forEach(item => {
      const li = document.createElement('li');
      li.className = 'list-group-item';

      li.innerHTML = `
        <img src="${item.image}" style="width:60px;height:60px;object-fit:cover;">
        
        <input type="file" data-id="${item.id}" class="form-control my-2">

        <button class="btn btn-success btn-sm"
          onclick="updateMenuImage('${cat}','${item.id}')">
          Update
        </button>

        <button class="btn btn-danger btn-sm"
          onclick="deleteMenu('${cat}','${item.id}')">
          Delete
        </button>
      `;

      menuList.appendChild(li);
    });
  });
}

// ✅ UPDATE IMAGE USING ID
window.updateMenuImage = async function(category, id) {
  const input = document.querySelector(`[data-id="${id}"]`);
  if (!input || input.files.length === 0) return;

  const file = input.files[0];
  const storageRef = storage.ref('menu/' + Date.now() + '_' + file.name);

  await storageRef.put(file);
  const imageUrl = await storageRef.getDownloadURL();

  const itemsRef = db.collection('menu').doc('items');

  await db.runTransaction(async (transaction) => {
    const doc = await transaction.get(itemsRef);
    let data = doc.data();
    let arr = data[category] || [];

    arr = arr.map(item => {
      if (item.id === id) {
        return { ...item, image: imageUrl };
      }
      return item;
    });

    transaction.set(itemsRef, { ...data, [category]: arr }, { merge: true });
  });

  loadMenu();
};

// ✅ DELETE USING ID
window.deleteMenu = async function(category, id) {
  const itemsRef = db.collection('menu').doc('items');

  await db.runTransaction(async (transaction) => {
    const doc = await transaction.get(itemsRef);
    let data = doc.data();
    let arr = data[category] || [];

    arr = arr.filter(item => item.id !== id);

    transaction.set(itemsRef, { ...data, [category]: arr }, { merge: true });
  });

  loadMenu();
};

loadMenu();
</script>
</body>
</html>
