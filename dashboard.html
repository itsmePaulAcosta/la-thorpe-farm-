<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Upload Menu Image</h2>

<input type="file" id="fileInput">

<select id="category">
  <option value="main">Main Dishes</option>
  <option value="catering">Catering</option>
  <option value="tray">Tray Menu</option>
</select>

<button onclick="uploadImage()">Upload</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuNw7VNAM-Do9ZkiXY5LHKVStJGRwd0Uw",
  authDomain: "menu-restaurant-268da.firebaseapp.com",
  projectId: "menu-restaurant-268da",
  storageBucket: "menu-restaurant-268da.appspot.com",
  messagingSenderId: "1060452948086",
  appId: "1:1060452948086:web:9009a4570c15f334a02757"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

window.uploadImage = async function () {
  const file = document.getElementById("fileInput").files[0];
  const category = document.getElementById("category").value;

  if (!file) {
    alert("Please select an image");
    return;
  }

  try {
    const storageRef = ref(storage, `${category}/${Date.now()}_${file.name}`);

    // Upload image
    const snapshot = await uploadBytes(storageRef, file);

    // Get URL
    const url = await getDownloadURL(snapshot.ref);

    // Save to Firestore
    await addDoc(collection(db, "menu"), {
      imageUrl: url,
      category: category,
      createdAt: new Date()
    });

    alert("Upload successful!");
  } catch (error) {
    console.error(error);
    alert("Upload failed");
  }
};
</script>

</body>
</html>
