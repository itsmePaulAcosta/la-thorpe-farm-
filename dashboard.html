<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard - La Thorpe</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
  <h2 class="mb-4">Owner Dashboard</h2>

  <!-- LOGIN -->
  <div id="login-section">
    <h4>Login</h4>
    <form id="loginForm">
      <div class="mb-3">
        <input type="email" id="email" class="form-control" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" id="password" class="form-control" placeholder="Password" required>
      </div>
      <button class="btn btn-primary">Login</button>
    </form>
    <div id="loginError" class="text-danger mt-2"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-section" style="display:none;">
    <button id="logoutBtn" class="btn btn-secondary mb-3">Logout</button>

    <h4>Welcome, Owner!</h4>
    <hr>

    <!-- MENU UPLOAD -->
    <h5>Menu Management</h5>
    <form id="menuForm" class="mb-3">
      <div class="row g-2">
        <div class="col-md-4">
          <select id="menuCategory" class="form-control">
            <option value="catering">Catering</option>
            <option value="maindishes">Main Dishes</option>
            <option value="tray">Tray</option>
          </select>
        </div>
        <div class="col-md-5">
          <input type="file" id="menuImageFile" class="form-control" accept="image/*" required>
        </div>
        <div class="col-md-2">
          <img id="menuImagePreview" style="width:40px;display:none;">
        </div>
        <div class="col-md-1">
          <button class="btn btn-success w-100">Upload</button>
        </div>
      </div>
    </form>

    <ul id="menuList" class="list-group mb-4"></ul>

    <!-- RECENT EVENTS -->
    <h5>Recent Events</h5>
    <form id="recentForm" class="mb-3">
      <div class="row g-2">
        <div class="col-md-6">
          <input type="file" id="recentImageFile" class="form-control" accept="image/*" required>
        </div>
        <div class="col-md-2">
          <img id="recentImagePreview" style="width:40px;display:none;">
        </div>
        <div class="col-md-2">
          <button class="btn btn-success w-100">Upload</button>
        </div>
      </div>
    </form>

    <ul id="recentList" class="list-group"></ul>
  </div>
</div>

<!-- Firebase (ONLY ONCE) -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "menu-restaurant-268da.firebaseapp.com",
    projectId: "menu-restaurant-268da",
    storageBucket: "menu-restaurant-268da.appspot.com",
    messagingSenderId: "1060452948086",
    appId: "1:1060452948086:web:9009a4570c15f334a02757"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // PREVIEW IMAGE
  document.getElementById('menuImageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById('menuImagePreview');
    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'inline-block';
    }
  });

  document.getElementById('recentImageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById('recentImagePreview');
    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'inline-block';
    }
  });

  // MENU UPLOAD
  document.getElementById('menuForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    try {
      const category = document.getElementById('menuCategory').value;
      const file = document.getElementById('menuImageFile').files[0];

      if (!file) return alert("Select an image");

      const ref = storage.ref('menu/' + Date.now() + '_' + file.name);
      await ref.put(file);

      const url = await ref.getDownloadURL();

      const docRef = db.collection('menu').doc('items');

      await db.runTransaction(async (tx) => {
        const doc = await tx.get(docRef);
        let data = doc.exists ? doc.data() : {};
        let arr = Array.isArray(data[category]) ? data[category] : [];
        arr.push({ image: url });
        tx.set(docRef, { ...data, [category]: arr }, { merge: true });
      });

      alert("Uploaded ✅");
      loadMenu();

    } catch (err) {
      console.error(err);
      alert(err.message);
    }
  });

  // RECENT UPLOAD
  document.getElementById('recentForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    try {
      const file = document.getElementById('recentImageFile').files[0];
      if (!file) return;

      const ref = storage.ref('recent/' + Date.now() + '_' + file.name);
      await ref.put(file);

      const url = await ref.getDownloadURL();

      await db.collection('recent').add({
        image: url,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      alert("Uploaded ✅");
      loadRecent();

    } catch (err) {
      console.error(err);
      alert(err.message);
    }
  });

  // LOAD MENU
  async function loadMenu() {
    const list = document.getElementById('menuList');
    list.innerHTML = '';

    const doc = await db.collection('menu').doc('items').get();
    if (!doc.exists) return;

    const data = doc.data();
    ['catering','maindishes','tray'].forEach(cat => {

      const header = document.createElement('li');
      header.className = 'list-group-item active';
      header.textContent = cat.toUpperCase();
      list.appendChild(header);

      (data[cat] || []).forEach(item => {
        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.innerHTML = `<img src="${item.image}" style="width:60px;height:60px;object-fit:cover;">`;
        list.appendChild(li);
      });

    });
  }

  // LOAD RECENT
  async function loadRecent() {
    const list = document.getElementById('recentList');
    list.innerHTML = '';

    const snap = await db.collection('recent').orderBy('createdAt','desc').get();

    snap.forEach(doc => {
      const data = doc.data();
      const li = document.createElement('li');
      li.className = 'list-group-item';
      li.innerHTML = `<img src="${data.image}" style="width:80px;height:80px;object-fit:cover;">`;
      list.appendChild(li);
    });
  }

  // LOGIN
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, password)
      .catch(err => {
        document.getElementById('loginError').textContent = err.message;
      });
  });

  // LOGOUT
  document.getElementById('logoutBtn').addEventListener('click', () => {
    auth.signOut();
  });

  // AUTH STATE
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('dashboard-section').style.display = 'block';
      loadMenu();
      loadRecent();
    } else {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('dashboard-section').style.display = 'none';
    }
  });

});
</script>

</body>
</html>
