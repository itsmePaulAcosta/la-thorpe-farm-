<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">🍽 Menu Dashboard (Upload Image)</h2>

    <!-- UPLOAD FORM -->
    <div class="card p-3 mb-4">

        <label class="mb-2">Choose Image</label>
        <input type="file" id="file" class="form-control mb-3">

        <select id="category" class="form-control mb-3">
            <option value="main">Main</option>
            <option value="catering">Catering</option>
            <option value="tray">Tray</option>
        </select>

        <button onclick="uploadMenu()" class="btn btn-primary">
            Upload Menu
        </button>

    </div>

    <!-- LIST -->
    <div class="card p-3">
        <h5>Menu Items</h5>
        <div id="list" class="row g-3"></div>
    </div>

</div>

<script>

const supabaseUrl = "https://hbibumxhmfjdqpbdgdmi.supabase.co";

/* FIX 2: safe initialization */
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);


async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
}

async function changePassword() {
    const newPassword = prompt("Enter new password:");

    if (!newPassword) return;

    const { data, error } = await supabaseClient.auth.updateUser({
        password: newPassword
    });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Password updated successfully!");
}
function openChangePassword() {
    changePassword();
}




async function checkAuth() {
    const { data, error } = await supabaseClient.auth.getUser();

    if (error || !data.user) {
        window.location.href = "login.html";
        return;
    }

    // only load data if logged in
    loadMenu();
}

// UPLOAD IMAGE + SAVE TO DB
async function uploadMenu() {

    const file = document.getElementById("file").files[0];
    const category = document.getElementById("category").value;

    if (!file) {
        alert("Please select an image");
        return;
    }

    const fileName = `public/${Date.now()}_${file.name}`;

    // 1. Upload to Storage
    const { error } = await supabaseClient.storage
        .from("menu-images")
        .upload(fileName, file);

    if (error) {
        console.error("UPLOAD ERROR:", error);
        alert(error.message);
        return;
    }

    // 2. Get Public URL
    const { data: urlData } = supabaseClient.storage
        .from("menu-images")
        .getPublicUrl(fileName);

    const image_url = urlData.publicUrl;

    // 3. Save to DB
    const { error: dbError } = await supabaseClient
        .from("menus")
        .insert([{ image_url, category }]);

    if (dbError) {
        console.error("DB ERROR:", dbError);
        alert(dbError.message);
        return;
    }

    alert("Uploaded successfully!");
    loadMenu();
}

// LOAD MENU
async function loadMenu() {

    const { data, error } = await supabaseClient
        .from("menus")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    const list = document.getElementById("list");
    list.innerHTML = "";

 data.forEach(item => {

    if (!item.id) return; // skip invalid rows

    list.innerHTML += `
        <div class="col-md-4">
            <div class="card p-2">
                <img src="${item.image_url}" class="img-fluid rounded mb-2">
                <small>Category: ${item.category}</small>

                <button class="btn btn-danger btn-sm mt-2"
                    onclick="deleteMenu('${item.id}')">
                    Delete
                </button>
            </div>
        </div>
    `;
});
}

// DELETE
async function deleteMenu(id) {

    console.log("Deleting ID:", id);

    const { data, error } = await supabaseClient
        .from("menus")
        .delete()
        .eq("id", id)
        .select(); // 👈 important for debugging

    console.log("Result:", data);
    console.log("Error:", error);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Deleted successfully!");
    loadMenu();
}

loadMenu();

// =========================
// LOGOUT
// =========================
async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
}

// =========================
// START APP
// =========================
checkAuth();


</script>
