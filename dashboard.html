<body class="bg-light">

<div class="container py-5">

    <h2 class="mb-4">🍽 Menu Dashboard (Upload Image)</h2>

        <label class="mb-2">Choose Image</label>

<small class="text-muted">You can select up to 15 images</small>

<div id="preview" class="row g-2 mt-2"></div>

        <select id="category" class="form-control mb-3">

         <button class="btn btn-danger btn-sm mb-3" onclick="deleteSelected()">
    🗑 Delete Selected

<script>

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);



async function changePassword() {
    const newPassword = prompt("Enter new password:");

    if (!newPassword) return;

    const { data, error } = await supabaseClient.auth.updateUser({
        password: newPassword
    });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Password updated successfully!");
}
function openChangePassword() {
    changePassword();
}




async function checkAuth() {
    const { data, error } = await supabaseClient.auth.getUser();

    if (error || !data.user) {
        window.location.href = "login.html";
        return;
    }

    // only load data if logged in
    loadMenu();
}

// UPLOAD IMAGE + SAVE TO DB
async function uploadMenu() {

    const files = document.getElementById("file").files;
    const category = document.getElementById("category").value;

    if (!files.length) {
        alert("Please select images");
        return;
    }

    if (files.length > 15) {
        alert("❌ Maximum 15 images only!");
        return;
    }

    let uploads = [];

    for (let i = 0; i < files.length; i++) {

        const file = files[i];
        const fileName = `public/${Date.now()}_${i}_${file.name}`;

        // 1. Upload to Supabase Storage
        const { error: uploadError } = await supabaseClient.storage
            .from("menu-images")
            .upload(fileName, file);

        if (uploadError) {
            console.error(uploadError);
            alert("Upload failed: " + uploadError.message);
            return;
        }

        // 2. Get public URL
        const { data: urlData } = supabaseClient.storage
            .from("menu-images")
            .getPublicUrl(fileName);

        uploads.push({
            image_url: urlData.publicUrl,
            category: category
        });
    }

    // 3. Insert all images into DB at once
    const { error: dbError } = await supabaseClient
        .from("menus")
        .insert(uploads);

    if (dbError) {
        console.error(dbError);
        alert(dbError.message);
        return;
    }

    alert(`✅ Uploaded ${uploads.length} images successfully!`);

    loadMenu();
}


let selectedIds = [];
// LOAD MENU
async function loadMenu() {

    

    const { data, error } = await supabaseClient
        .from("menus")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    const mainList = document.getElementById("mainList");
    const cateringList = document.getElementById("cateringList");
    const trayList = document.getElementById("trayList");

    mainList.innerHTML = "";
    cateringList.innerHTML = "";
    trayList.innerHTML = "";

    data.forEach(item => {

        const card = `
    <div class="col-md-4">
        <div class="card shadow-sm p-2">

            <input type="checkbox" class="form-check-input mb-2"
                onchange="toggleSelect('${item.id}', this.checked)">

            <img src="${item.image_url}" class="img-fluid rounded mb-2">

            <small class="text-muted">Category: ${item.category}</small>

            <button class="btn btn-danger btn-sm mt-2"
                onclick="deleteMenu('${item.id}')">
                Delete
            </button>
        </div>
    </div>
`;


        if (item.category === "main") {
            mainList.innerHTML += card;
        }

        if (item.category === "catering") {
            cateringList.innerHTML += card;
        }

        if (item.category === "tray") {
            trayList.innerHTML += card;
        }
    });
}
function toggleSelect(id, checked) {
    if (checked) {
        selectedIds.push(id);
    } else {
        selectedIds = selectedIds.filter(x => x !== id);
    }
}


// DELETE
async function deleteMenu(id) {

    console.log("Deleting ID:", id);

    const { data, error } = await supabaseClient
        .from("menus")
        .delete()
        .eq("id", id)
        .select(); // 👈 important for debugging

    console.log("Result:", data);
    console.log("Error:", error);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Deleted successfully!");
    loadMenu();
}

loadMenu();

async function deleteSelected() {

    if (selectedIds.length === 0) {
        alert("No items selected!");
        return;
    }

    if (!confirm(`Delete ${selectedIds.length} items?`)) return;

    const { error } = await supabaseClient
        .from("menus")
        .delete()
        .in("id", selectedIds);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Deleted successfully!");

    selectedIds = [];
    loadMenu();
}

// =========================
// LOGOUT
// =========================
async function logout() {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
}

// =========================
// START APP
// =========================
checkAuth();


document.getElementById("file").addEventListener("change", function () {
    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    const files = this.files;

    if (files.length > 15) {
        alert("Maximum 15 images only!");
        this.value = "";
        return;
    }

    Array.from(files).forEach(file => {
        const reader = new FileReader();

        reader.onload = function (e) {
            preview.innerHTML += `
                <div class="col-3">
                    <img src="${e.target.result}" class="img-fluid rounded border">
                </div>
            `;
        };

        reader.readAsDataURL(file);
    });
});

</script>
