<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card p-4" style="width:350px;">
    <h4 class="mb-3 text-center">🔐 Admin Login</h4>

    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <button id="loginBtn" class="btn btn-primary w-100">Login</button>
</div>

<script>
// ✅ SAFE CLIENT NAME (no conflict)
const supabaseClient = window.supabase.createClient(
    "https://hbibumxhmfjdqpbdgdmi.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiaWJ1bXhobWZqZHFwYmRnZG1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTY2NzIsImV4cCI6MjA5MTMzMjY3Mn0.0KgghCk-H-a55UEAJO0lWSOxWFkjQTCCHhpjIsi2SDk"
);

// auto redirect if already logged in
(async () => {
    const { data } = await supabaseClient.auth.getUser();
    if (data.user) {
        window.location.href = "dashboard.html";
    }
})();

// ✅ FIX: no onclick, use event listener
document.getElementById("loginBtn").addEventListener("click", login);

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please enter email and password");
        return;
    }

    const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert(error.message);
        return;
    }

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
